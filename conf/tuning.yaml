tuning:
  zone: AEP
  panel_path: data/processed/panel/single_zone/AEP_panel.parquet
  models:
    - TFT
    - DeepAR
  max_trials_first_pass: 12
  folds_for_full_first_pass: 2
  status: deferred_on_local_machine
  horizon_hours: 24
  min_train_hours: 2160
  window_mode: expanding
  primary_metric: mean_pinball_loss
  target_coverage: 0.80
  coverage_min: 0.70
  coverage_max: 0.90
  mae_regression_limit: 0.15
  allow_deepar_if_interval_collapse: false
  max_steps_cap: 60
  timeout_minutes: null
  enable_tracking: false
  output_root: data/cache/tuning
  report_root: data/cache/reports
  artifact_root: artifacts/tuning
  seed: 42

resource_profiles:
  local_safe:
    description: "Local laptop-safe profile for 8GB VRAM / 16GB RAM"
    max_trials: 2
    folds: 1
    max_steps_cap: 3
    batch_size: 4
    num_workers: 0
    enable_checkpointing: false
    enable_mlflow_by_default: false
    cleanup_after_trial: true
    allow_heavy_run: false

  cloud_16gb:
    description: "Moderate cloud GPU profile, intended for 16GB VRAM"
    max_trials: 12
    folds: 2
    max_steps_cap: 50
    batch_size: 8
    num_workers: 0
    enable_checkpointing: false
    enable_mlflow_by_default: true
    cleanup_after_trial: true
    allow_heavy_run: true

  cloud_24gb:
    description: "Larger cloud GPU profile, intended for 24GB+ VRAM"
    max_trials: 30
    folds: 3
    max_steps_cap: 100
    batch_size: 16
    num_workers: 0
    enable_checkpointing: true
    enable_mlflow_by_default: true
    cleanup_after_trial: false
    allow_heavy_run: true
